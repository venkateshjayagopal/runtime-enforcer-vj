name: merge-multiarch-images
description: merge multi-arch images based on images digests provided
inputs:
  digest_artifact_prefix:
    description: the prefix of the artifact filename
    default: digest-
  image:
    description: |
      The image name component in a fully qualified image. For reference:
      ghcr.io/<repo>/<image>:<tag>
    required: true
  repo:
    description: |
      The repository component in a fully qualified image. For reference:
      ghcr.io/<repo>/<image>:<tag>
    required: true
  tag:
    description: |
      The tag component in a fully qualified image.
    required: true
  arch:
    description: The list of image architecture for this action to merge
    default: amd64
  GH_TOKEN:
    description: |
      The GitHub token with permission to publish images to ghcr.
    required: true
runs:
  using: composite
  steps: 
    - name: Download all digests
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: ${{ runner.temp }}/digests
        pattern: ${{ inputs.digest_artifact_prefix}}${{ inputs.image }}-*
        merge-multiple: true
    - name: Install cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
    - name: Login to GHCR
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.GH_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - name: Create and push multi-arch manifest for ${{ inputs.image }}
      id: create-manifest
      working-directory: ${{ runner.temp }}/digests
      shell: bash
      run: |
        set -e
        TARGET=""

        ARCHES=$(echo ${INPUTS_ARCH} | tr ',' ' ')

        for ARCH in $ARCHES
        do
          TARGET+=" ghcr.io/${INPUTS_REPO}/${INPUTS_IMAGE}@$(cat ${INPUTS_IMAGE}-$ARCH.txt)"
        done

        # Create the manifest locally
        docker buildx imagetools create \
          -t ghcr.io/${INPUTS_REPO}/${INPUTS_IMAGE}:${INPUTS_TAG} \
          $TARGET \
          --dry-run > expected-multi-arch-manifest.json

        # Create the manifest and push it
        docker buildx imagetools create \
          -t ghcr.io/${INPUTS_REPO}/${INPUTS_IMAGE}:${INPUTS_TAG} \
          $TARGET

        # The previous command is NOT printing the digest of the multi-arch manifest, we have to obtain it by
        # fetching it from the OCI registry and **verify** its contents before signing it

        # Fetch the multi arch manifest
        docker buildx imagetools inspect ghcr.io/${INPUTS_REPO}/${INPUTS_IMAGE}:${INPUTS_TAG} \
          --raw > multi-arch-manifest.json
        multi_arch_manifest_digest="sha256:$(sha256sum multi-arch-manifest.json | awk '{print $1}')"

        # Compare the contents of the manifest we previously computed and the actual one.
        # Use jq to sort the contents and build a compact output (removing useless whitespaces),
        # this is done to ensure the JSON documents have the same structure.
        expected_digest="sha256:$(jq -S -c . expected-multi-arch-manifest.json | sha256sum | awk '{print $1}')"
        actual_digest="sha256:$(jq -S -c . multi-arch-manifest.json | sha256sum | awk '{print $1}')"

        if [ "$expected_digest" != "$actual_digest" ]; then
          echo "Error: digests do not match!"
          exit 1
        fi

        # Sign the multi-arch image manifest using cosign v2 format
        cosign sign --yes --new-bundle-format=false --use-signing-config=false \
          ghcr.io/${INPUTS_REPO}/${INPUTS_IMAGE}@${multi_arch_manifest_digest}

        # Sign the multi-arch image manifest using cosign v3 format
        cosign sign --yes --new-bundle-format=true --use-signing-config=true \
          ghcr.io/${INPUTS_REPO}/${INPUTS_IMAGE}@${multi_arch_manifest_digest}

        echo "MULTI_ARCH_MANIFEST_DIGEST=$multi_arch_manifest_digest" >> $GITHUB_OUTPUT
      env:
        INPUTS_ARCH: ${{ inputs.arch }}
        INPUTS_REPO: ${{ inputs.repo }}
        INPUTS_IMAGE: ${{ inputs.image }}
        INPUTS_TAG: ${{ inputs.tag }}

    - name: Verify multi-arch manifest signature
      shell: bash
      run: |
        cosign verify \
          --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
          --certificate-identity="${{ github.server_url }}/${GITHUB_WORKFLOW_REF}" \
          ghcr.io/${INPUTS_REPO}/${INPUTS_IMAGE}@${MULTI_ARCH_MANIFEST_DIGEST} 
      env:
        INPUTS_REPO: ${{ inputs.repo }}
        INPUTS_IMAGE: ${{ inputs.image }}
        MULTI_ARCH_MANIFEST_DIGEST: ${{ steps.create-manifest.outputs.MULTI_ARCH_MANIFEST_DIGEST }}
