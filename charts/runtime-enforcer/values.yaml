operator:
  args:
  - --metrics-bind-address=:8443
  - --leader-elect
  - --health-probe-bind-address=:8081
  # operator.env -- Additional environment variables
  # @schema additionalProperties:true
  env: []
  # The containerSecurityContext used by runtime-enforcer operator
  # @schema additionalProperties:true
  containerSecurityContext:
    runAsUser: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  image:
    repository: ghcr.io/rancher-sandbox/runtime-enforcer/operator
    tag: v0.3.0
    pullPolicy: IfNotPresent
  # To make the Pods "Guaranteed" (evicted last under node pressure), kubelet requires
  # requests and limits are specified for all the containers and they are equal.
  # Please refer to https://kubernetes.io/docs/concepts/scheduling-eviction/node-pressure-eviction/#pod-selection-for-kubelet-eviction
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 500m
      memory: 128Mi
  wpStatusUpdateInterval: 30s
  # The podSecurityContext used by runtime-enforcer operator
  # @schema additionalProperties:true
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  replicas: 1
  # PodDisruptionBudget for the operator Deployment. Disable by default.
  # When enabled, limits voluntary disruption (e.g. kubectl drain).
  pdb:
    enabled: false
    # minAvailable: at least 1 pod must stay available during a disruption.
    minAvailable: 1
  serviceAccount:
    # operator.serviceAccount.annotations -- Additional annotations to add to operator's service account.
    # @schema additionalProperties:true
    annotations: {}
  tolerations: []
  # operator.podLabels -- Additional labels to add to the operator pods.
  # @schema additionalProperties:true
  podLabels: {}
  # operator.podAnnotations -- Additional annotations to add to the operator pods.
  # @schema additionalProperties:true
  podAnnotations: {}
  # operator.nodeSelector -- Node selector for the operator pods.
  # @schema additionalProperties:true
  nodeSelector: {}
  # operator.affinity -- Affinity rules for the operator pods.
  # @schema additionalProperties:true
  affinity: {}
agent:
  args:
  - ""
  # agent.env -- Additional environment variables
  # @schema additionalProperties:true
  env: []
  # The containerSecurityContext used by agent
  # @schema additionalProperties:true
  containerSecurityContext:
    privileged: true
    allowPrivilegeEscalation: true
    # In some environments it is possible to run without full privileges.
    # To do that put `privileged: false` and `allowPrivilegeEscalation: false`.
    #
    # Minimal capabilities required for eBPF operations:
    # - CAP_BPF: Required for loading eBPF programs
    # - CAP_PERFMON: Required for attaching tracing programs (kprobes/tracepoints)
    # - CAP_SYS_RESOURCE: Required for removing memlock limits (rlimit.RemoveMemlock)
    # - CAP_SYS_PTRACE: Required to access host cgroup filesystem
    # - CAP_SYS_ADMIN: mitigation required for accessing BTF in older kernels (see: https://github.com/rancher-sandbox/runtime-enforcer/issues/152)
    capabilities:
      add:
        - BPF
        - PERFMON
        - SYS_RESOURCE
        - SYS_PTRACE
        - SYS_ADMIN
      drop:
        - ALL
  image:
    repository: ghcr.io/rancher-sandbox/runtime-enforcer/agent
    tag: v0.3.0
    pullPolicy: IfNotPresent
  grpcExporterPort: "50051"
  # agent logger level. Can be one of: debug, info, warn, error.
  logLevel: info
  # To make the Pods "Guaranteed" (evicted last under node pressure), kubelet requires
  # requests and limits are specified for all the containers and they are equal.
  # Please refer to https://kubernetes.io/docs/concepts/scheduling-eviction/node-pressure-eviction/#pod-selection-for-kubelet-eviction
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 500m
      memory: 256Mi
  hostPID: true
  # The podSecurityContext used by agent
  # @schema additionalProperties:true
  podSecurityContext:
    runAsNonRoot: false
    seccompProfile:
      type: RuntimeDefault
  serviceAccount:
    # agent.serviceAccount.annotations -- Additional annotations to add to agent's service account.
    # @schema additionalProperties:true
    annotations: {}
  tolerations: []
  # agent.podLabels -- Additional labels to add to the agent pods.
  # @schema additionalProperties:true
  podLabels: {}
  # agent.podAnnotations -- Additional annotations to add to the agent pods.
  # @schema additionalProperties:true
  podAnnotations: {}
  # agent.nodeSelector -- Node selector for the agent pods.
  # @schema additionalProperties:true
  nodeSelector: {}
  # agent.affinity -- Affinity rules for the agent pods.
  # @schema additionalProperties:true
  affinity: {}
  nriSocketPath: /var/run/nri/
kubernetesClusterDomain: cluster.local

## Optional array of imagePullSecrets containing private registry credentials
## Ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []

# Learning mode configuration
learning:
  # learning.enabled controls whether learning mode is enabled for the entire cluster.
  # When disabled, no process learning occurs. Process enforcer remains unaffected.
  enabled: true
  # Label selector for namespaces to include in learning.
  #   namespaceSelector: ""         # learn from all namespaces
  #   namespaceSelector: "env=prod" # namespaces with label env=prod
  namespaceSelector: ""
  # Label selector for namespaces to include in learning.
  #   namespaceSelectorObject: {}   # learn from all namespaces
  #   namespaceSelectorObject:      # namespaces with label env=prod
  #     matchLabels:
  #       env: prod
  # @schema additionalProperties:true
  namespaceSelectorObject: {}

telemetry:
  # runtime-enforcer telemetry configuration allow one OpenTelemetry
  # collector communication options: 
  # - custom: It will configure the controller and policy server to send metrics
  # and traces to a custom collector

  # The default configuration is to use the custom option.
  mode: custom
  # telemetry.metrics is used to enable/disable the metrics collection and
  # exportation to the OpenTelemetry collector.
  metrics: false
  # telemetry.tracing is used to enable/disable the tracing collection and
  # exportation to the OpenTelemetry collector.
  tracing: false

  violations:
    collector:
      enabled: true
      image:
        repository: otel/opentelemetry-collector-contrib
        tag: "0.145.0"
        pullPolicy: IfNotPresent
      resources:
        limits:
          cpu: 250m
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 64Mi

  # The following settings are mandatory to configure the OpenTelemetry
  # exporter in the controller and policy server to send metrics and traces to
  # a custom collector.
  custom:
    # telemetry.custom.endpoint is the Otel collector endpoint to send metrics and
    # traces to. It should be in the format https://<hostname>:<port>.
    endpoint: ""
    # telemetry.custom.insecure is used to configure the OpenTelemetry exporter to skip
    # the certificate validation when sending metrics and traces to a remote
    # collector.
    insecure: false
    # The following settings are required to configure the OpenTelemetry exporter
    # in the controller and policy server to send metrics and traces to a remote
    # collector using TLS. Both secrets must be created in the same namespace
    # where the controller is deployed.
    #
    # telemetry.custom.otelCollectorCertificateSecret should contains a key ca.crt
    # storing the certifcate to validate the remote collector certificate.
    otelCollectorCertificateSecret: ""
    # telemetry.custom.otelCollectorClientCertificateSecret secret is optional. It's
    # only required when the remote collector requires client authentication
    # (mTLS). It should contains two keys: tls.crt and tls.key storing the client
    # certificate and key respectively.
    otelCollectorClientCertificateSecret: ""

# ValidatingAdmissionPolicy for Pod policy validation
# Requires Kubernetes 1.25+ for ValidatingAdmissionPolicy support
vap:
  enabled: true

# PriorityClass shared by both operator and agent pods.
priorityClass:
  enabled: true
  name: runtime-enforcer-priorityclass
  value: 1000000
  globalDefault: false
  description: PriorityClass for runtime-enforcer operator and agent pods.
