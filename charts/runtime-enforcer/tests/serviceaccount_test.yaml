suite: "Service Account Tests"
templates:
  - "templates/operator/serviceaccount.yaml"
  - "templates/agent/serviceaccount.yaml"

tests:
  - it: "should add annotations to service account"
    set:
      operator:
        serviceAccount:
          annotations:
            key: value
      agent:
        serviceAccount:
          annotations:
            key: value
    asserts:
      - equal:
          path: metadata.annotations["key"]
          value: "value"
