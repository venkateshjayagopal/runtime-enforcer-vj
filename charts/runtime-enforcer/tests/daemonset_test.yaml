suite: "Agent DaemonSet Tests"
templates:
  - "templates/agent/daemonset.yaml"

tests:
  - it: "should allow image, and imagePullPolicy to be overridden"
    set:
      agent:
        image:
          repository: somewhere/agent
          tag: v9.9.9
          pullPolicy: Always
    asserts:
      - equal:
          path: "spec.template.spec.containers[0].image"
          value: "somewhere/agent:v9.9.9"
      - equal:
          path: "spec.template.spec.containers[0].imagePullPolicy"
          value: "Always"
      - equal:
          path: "spec.template.spec.priorityClassName"
          value: "runtime-enforcer-priorityclass"

  - it: "should include --enable-learning flag when learning is enabled"
    set:
      learning:
        enabled: true
    asserts:
      - contains:
          path: "spec.template.spec.containers[0].args"
          content: "--enable-learning"

  - it: "should not include --enable-learning flag when learning is disabled"
    set:
      learning:
        enabled: false
    asserts:
      - notContains:
          path: "spec.template.spec.containers[0].args"
          content: "--enable-learning"

  - it: "should include grpc port argument"
    set:
      agent:
        grpcExporterPort: "12"
    asserts:
      - contains:
          path: "spec.template.spec.containers[0].args"
          content: "--grpc-port=12"

  - it: "check tolerations"
    set:
      agent:
        tolerations:
          - key: "dedicated"
            operator: "Equal"
            value: "experimental"
            effect: "NoSchedule"
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: "dedicated"
            operator: "Equal"
            value: "experimental"
            effect: "NoSchedule"

  - it: "should include log level argument"
    set:
      agent:
        logLevel: debug
    asserts:
      - contains:
          path: "spec.template.spec.containers[0].args"
          content: "--log-level=debug"

  - it: "should add extra pod environment variables"
    set:
      agent:
        env:
          - name: EXTRA_ENV
            value: extra_value
    asserts:
      - contains:
          path: "spec.template.spec.containers[0].env"
          content:
            name: EXTRA_ENV
            value: extra_value

  - it: "should add extra pod labels"
    set:
      agent:
        podLabels:
          environment: staging
          team: platform
    asserts:
      - equal:
          path: spec.template.metadata.labels.environment
          value: staging
      - equal:
          path: spec.template.metadata.labels.team
          value: platform

  - it: "should add extra pod annotations"
    set:
      agent:
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "9090"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/port"]
          value: "9090"

  - it: "should set nodeSelector"
    set:
      agent:
        nodeSelector:
          kubernetes.io/os: linux
          disk: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["kubernetes.io/os"]
          value: linux
      - equal:
          path: spec.template.spec.nodeSelector.disk
          value: ssd

  - it: "should not render nodeSelector when empty"
    set:
      agent:
        nodeSelector: {}
    asserts:
      - notExists:
          path: spec.template.spec.nodeSelector

  - it: "should set affinity"
    set:
      agent:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - amd64
    asserts:
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: kubernetes.io/arch

  - it: "should not render affinity when empty"
    set:
      agent:
        affinity: {}
    asserts:
      - notExists:
          path: spec.template.spec.affinity
