---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    helm.sh/resource-policy: keep
    controller-gen.kubebuilder.io/version: v0.17.1
  name: workloadpolicies.security.rancher.io
spec:
  group: security.rancher.io
  names:
    categories:
    - rancher-security
    kind: WorkloadPolicy
    listKind: WorkloadPolicyList
    plural: workloadpolicies
    shortNames:
    - wp
    singular: workloadpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .status.phase
      name: Status
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: WorkloadPolicy is the Schema for the workloadpolicies API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              mode:
                description: |-
                  mode defines the execution mode of this policy. Can be set to
                  either "protect" or "monitor". In "protect" mode, the policy
                  blocks and reports violations, while in "monitor" mode,
                  it only reports violations.
                enum:
                - monitor
                - protect
                type: string
              rulesByContainer:
                additionalProperties:
                  properties:
                    executables:
                      description: executables defines a security policy for executables.
                      properties:
                        allowed:
                          description: allowed defines a list of executables that
                            are allowed to run
                          items:
                            type: string
                          type: array
                      type: object
                  type: object
                description: rulesByContainer specifies for each container the list
                  of rules to apply.
                type: object
            required:
            - mode
            type: object
          status:
            properties:
              failedNodes:
                description: failedNodes is the number of nodes where the policy enforcement
                  failed.
                type: integer
              nodesTransitioning:
                description: nodesTransitioning contains the names of the nodes that
                  are transitioning.
                items:
                  type: string
                type: array
              nodesWithIssues:
                additionalProperties:
                  description: NodeIssue represents an issue with a node.
                  properties:
                    code:
                      description: code is the issue code.
                      type: string
                    message:
                      description: message is a human-readable description of the
                        issue.
                      type: string
                  type: object
                description: nodesWithIssues contains the status of each node with
                  issues.
                type: object
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: phase indicates the current phase of the workload policy.
                type: string
              successfulNodes:
                description: successfulNodes is the number of nodes where the policy
                  is successfully enforced.
                type: integer
              totalNodes:
                description: totalNodes is the total number of nodes the policy is
                  applied to.
                type: integer
              transitioningNodes:
                description: transitioningNodes is the number of nodes where the policy
                  is transitioning mode.
                type: integer
              violationCount:
                description: |-
                  violationCount is the total number of violation records,
                  including those no longer retained in violations.

                  Note: This value is maintained by the reconciler and reflects
                  its best-effort view of the system. It is not guaranteed to be
                  strongly consistent and may be temporarily outdated depending on
                  reconciliation.
                format: int64
                type: integer
              violations:
                description: |-
                  violations is the list of the most recent violation records (max MaxViolationRecords).
                  Oldest entries are dropped when the limit is reached.
                items:
                  description: ViolationRecord holds the details of a single policy
                    violation.
                  properties:
                    action:
                      description: action is the enforcement action taken (monitor
                        or protect).
                      type: string
                    containerName:
                      description: containerName is the container where the unauthorized
                        executable ran.
                      type: string
                    executablePath:
                      description: executablePath is the path of the unauthorized
                        executable.
                      type: string
                    nodeName:
                      description: nodeName is the node where the violation occurred.
                      type: string
                    podName:
                      description: podName is the name of the pod where the violation
                        occurred.
                      type: string
                    timestamp:
                      description: timestamp is when the violation occurred.
                      format: date-time
                      type: string
                  required:
                  - action
                  - containerName
                  - executablePath
                  - nodeName
                  - podName
                  - timestamp
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
