apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "runtime-enforcer.fullname" . }}-agent
  labels:
  {{- include "runtime-enforcer.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
    {{- include "runtime-enforcer.agent.labelSelector" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 100%
  template:
    metadata:
      labels:
      {{- include "runtime-enforcer.agent.labelSelector" . | nindent 8 }}
      {{- with .Values.agent.podLabels }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
      annotations:
        kubectl.kubernetes.io/default-container: agent
      {{- with .Values.agent.podAnnotations }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.priorityClass.name }}
      priorityClassName: {{ .Values.priorityClass.name }}
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
      - args:
        {{- if .Values.learning.enabled }}
        - --enable-learning
        {{- end }}
        {{- if .Values.learning.namespaceSelector }}
        - --learning-namespace-selector={{ .Values.learning.namespaceSelector }}
        {{- else if .Values.learning.namespaceSelectorObject }}
        - --learning-namespace-selector={{ .Values.learning.namespaceSelectorObject | toJson }}
        {{- end }}
        - --grpc-port={{ .Values.agent.grpcExporterPort }}
        - --grpc-mtls-cert-dir={{ include "runtime-enforcer.grpc.certDir" . }}
        - --log-level={{ .Values.agent.logLevel }}
        {{- toYaml .Values.agent.args | nindent 8 }}
        command:
        - /agent
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        {{- if eq .Values.telemetry.collectorStrategy "default" }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: https://{{ include "runtime-enforcer.fullname" . }}-otel-collector.{{ .Release.Namespace }}.svc.cluster.local:4317
        - name: OTEL_EXPORTER_OTLP_CERTIFICATE
          value: {{ include "runtime-enforcer.grpc.certDir" . }}/ca.crt
        {{- else if eq .Values.telemetry.collectorStrategy "external" }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .Values.telemetry.externalCollector.endpoint }}
        {{- if .Values.telemetry.externalCollector.otelCollectorCertificateSecret }}
        - name: OTEL_EXPORTER_OTLP_CERTIFICATE
          value: /tmp/otel-collector-certs/ca.crt
        {{- else }}
        - name: OTEL_EXPORTER_OTLP_INSECURE
          value: "true"
        {{- end }}
        {{- if .Values.telemetry.externalCollector.otelCollectorClientCertificateSecret }}
        - name: OTEL_EXPORTER_OTLP_CLIENT_CERTIFICATE
          value: /tmp/otel-collector-client-certs/tls.crt
        - name: OTEL_EXPORTER_OTLP_CLIENT_KEY
          value: /tmp/otel-collector-client-certs/tls.key
        {{- end }}
        {{- end }}
        {{- with .Values.agent.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        image: {{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
        name: agent
        startupProbe:
          httpGet:
            path: /readyz
            port: 8081
          # we give 45s (5s delay + 8 attempts every 5s) for the startup probe to succeed
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 8
        resources: {{- toYaml .Values.agent.resources | nindent 10 }}
        securityContext: {{- toYaml .Values.agent.containerSecurityContext | nindent 10 }}
        volumeMounts:
        - name: nri-socket
          mountPath: /var/run/nri/
          mountPropagation: HostToContainer
          readOnly: true
        - name: grpc-certs
          mountPath: {{ include "runtime-enforcer.grpc.certDir" . }}
          readOnly: true
        {{- if .Values.telemetry.externalCollector.otelCollectorCertificateSecret }}
        - name: otel-collector-ca-cert
          mountPath: /tmp/otel-collector-certs
          readOnly: true
        {{- end }}
        {{- if .Values.telemetry.externalCollector.otelCollectorClientCertificateSecret }}
        - name: otel-collector-client-cert
          mountPath: /tmp/otel-collector-client-certs
          readOnly: true
        {{- end }}

      hostPID: {{ .Values.agent.hostPID }}
      securityContext: {{- toYaml .Values.agent.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "runtime-enforcer.fullname" . }}-agent
      terminationGracePeriodSeconds: 10
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - name: nri-socket
        hostPath:
          path: {{ .Values.agent.nriSocketPath }}
      - name: grpc-certs
        csi:
          driver: "csi.cert-manager.io"
          readOnly: true
          volumeAttributes:
            csi.cert-manager.io/issuer-name: {{ include "runtime-enforcer.caIssuerName" . }}
            csi.cert-manager.io/issuer-kind: Issuer
            csi.cert-manager.io/dns-names: ${POD_NAME}.${POD_NAMESPACE}
      {{- if and (eq .Values.telemetry.collectorStrategy "external") .Values.telemetry.externalCollector.otelCollectorCertificateSecret }}
      - name: otel-collector-ca-cert
        secret:
          secretName: {{ .Values.telemetry.externalCollector.otelCollectorCertificateSecret }}
      {{- end }}
      {{- if and (eq .Values.telemetry.collectorStrategy "external") .Values.telemetry.externalCollector.otelCollectorClientCertificateSecret }}
      - name: otel-collector-client-cert
        secret:
          secretName: {{ .Values.telemetry.externalCollector.otelCollectorClientCertificateSecret }}
      {{- end }}
